# ============================================================
# 古籍图像智能裁剪与压缩引擎 - 外部配置文件
# ============================================================
#
# 使用说明：
#   1. 复制此文件为 config.yaml 放置于项目根目录
#   2. 或通过 AncientBookEngine.from_config("your_config.yaml") 加载
#   3. 参数值均为字符串，引擎启动时会自动类型转换
#
# 联系方式：如需调整参数，请参考下方各参数的说明与推荐值
# ============================================================

# ------------------------------------------------------------
# 版式与裁剪参数
# ------------------------------------------------------------

# 版心提取模式
#   取值: "smart" | "union" | "largest"
#   说明:
#     - smart:  智能分离模式，通过Y轴垂直像素投影切断页眉/页脚，
#               提取文字面积最大的主正文段落（推荐，用于有页眉页脚的重印本）
#     - union:  全局并集模式，提取所有文字连通域的全局最小包围盒，
#               适用于多栏古籍、竖排数列、孤立的注文（不丢文字）
#     - largest: 最大连通模式，仅提取面积最大的单一连通域，
#               适用于单栏纯正文扫描件
#   推荐: "smart"
crop_mode: "smart"

# smart模式下的闭运算容差系数（基于图像高度计算）
#   取值范围: 0.005 ~ 0.05
#   说明: Y轴像素投影中，高于此阈值的行被判定为有文字。
#         值越大，越严格，空行越多；值越小，越宽松，可能混入空白行。
#         竖排古籍建议偏小（0.01~0.015），现代横排书建议偏大（0.02~0.03）
#   推荐: 0.015
smart_gap_ratio: 0.015


# ------------------------------------------------------------
# 文本安全参数
# ------------------------------------------------------------

# 伪影过滤安全阀（防止误切贴边文字）
#   取值: true | false
#   说明:
#     - true:  严格模式，仅当高大细长块（高宽比>15:1）在图像边缘3%范围内
#              且面积<5%时才会被判定为扫描黑边并删除
#              优点：更干净  缺点：可能把真正贴边的细长文字（如书名竖排）当黑边删掉
#     - false: 宽松模式，仅删除极度细长（高宽比>30:1）且面积极小（<0.5%）的边缘块
#              优点：绝不切文字  缺点：可能残留少量扫描黑边/黑角
#   推荐: false（古籍处理优先保护文字，宁可留少量黑影）
strict_artifact_filter: false

# 边缘吸附防切容忍度（相对于图像宽度的比例）
#   取值范围: 0.01 ~ 0.15
#   说明: 当计算出的版心框距离原图物理边缘小于此比例的宽度时，
#         该侧放弃裁剪，边界反弹回原图边缘，强行保留原始边缘。
#         目的：防止版心贴边时被错误裁切导致文字被切边。
#         值越小越激进裁剪（可能切边），值越大越保守（留白多）
#   推荐: 0.05（即图像宽度的5%，约1/20）
edge_tolerance_ratio: 0.05


# ------------------------------------------------------------
# 留白与边缘保护参数
# ------------------------------------------------------------

# 水平方向留白比例（相对于最终版心宽度）
#   取值范围: 0.0 ~ 0.10
#   说明: 裁剪后的版心外扩此比例宽度的白边。
#         值越大留白越多，值越小裁剪越紧。
#   推荐: 0.02（2%）
padding_ratio_w: 0.02

# 垂直方向留白比例（相对于最终版心高度）
#   取值范围: 0.0 ~ 0.10
#   说明: 同 padding_ratio_w，但作用于垂直方向。
#   推荐: 0.02（2%）
padding_ratio_h: 0.02

# 留白保底像素值（左右上下统一）
#   取值范围: 0 ~ 100
#   说明: 无论 padding_ratio 计算结果如何，实际留白不低于此像素数。
#         防止版心很小时留白被计算为0或极小值。
#         注意：此值为每侧最小留白，总计最少增加 2*该值 的宽高
#   推荐: 25（确保Kindle上阅读时有舒适边距）
padding_min_pixel: 25


# ------------------------------------------------------------
# 图像增强与锐化参数
# ------------------------------------------------------------

# USM锐化强度系数
#   取值范围: 0.5 ~ 3.0
#   说明: USM（Unsharp Mask）锐化强度。
#         通过高斯模糊加权叠加增强文字边缘对比度，使文字更锐利。
#         1.0 = 不锐化（原始强度）
#         > 1.0 = 增强锐化；值越大边缘越锐利（但过高会产生毛刺）
#         < 1.0 = 降低锐化
#         对二值图来说，1.2 ~ 1.5 是比较舒适的区间
#   推荐: 1.2
sharpness: 1.2

# 大津法阈值缩放系数
#   取值范围: 0.5 ~ 2.0
#   说明: 大津法（Otsu）二值化阈值的人工缩放系数。
#         > 1.0：阈值变大，图像更亮（更多白色被保留）
#         < 1.0：阈值变小，图像更暗（更多黑色被保留）
#         古籍扫描件通常偏暗，建议用 1.0 ~ 1.1
#         背景泛黄的现代印刷品可尝试 0.9 ~ 1.0
#   推荐: 1.0
otsu_scale: 1.0


# ------------------------------------------------------------
# 压缩参数
# ------------------------------------------------------------

# 输出格式
#   取值: "png" | "jpg"
#   说明:
#     - png: 极限脱水模式。强制使用 1-bit 位图存储（IMWRITE_PNG_BILEVEL=1），
#            配合 Zlib 最高压缩（compression=9），可获得最小体积。
#            适用于纯文字古籍，边缘极度锐利，但无灰阶。
#     - jpg: 灰阶高压模式。保留插值产生的灰阶边缘，
#            配合霍夫曼优化（IMWRITE_JPEG_OPTIMIZE=1），
#            体积小于原图但大于PNG，质量较高。
#            适用于有插图或有灰阶过渡的文字扫描件。
#   推荐: "png"（古籍文字优先选PNG；含照片/插图的选JPG）
compress_format: "png"

# JPG 压缩质量（仅当 compress_format = "jpg" 时生效）
#   取值范围: 1 ~ 100
#   说明: JPG 输出质量。值越大画质越高，文件越大。
#         墨水屏阅读器（Kindle）建议 75 ~ 90。
#         屏幕阅读可适当降低以节省空间。
#   推荐: 85
jpeg_quality: 85


# ------------------------------------------------------------
# 性能参数
# ------------------------------------------------------------

# 最大并发线程数
#   取值范围: 1 ~ 32
#   说明: ThreadPoolExecutor 的最大工作线程数。
#         批量处理时并行处理的最大图像数。
#         建议值：CPU核心数的 50% ~ 100%。
#         过高反而因线程切换开销反而变慢。
#         输入/输出为机械硬盘时不宜过高（I/O瓶颈）。
#   推荐: 4（桌面级通用值）；8（多核工作站）
max_workers: 16


# ------------------------------------------------------------
# 日志与调试
# ------------------------------------------------------------

# 是否输出详细处理日志
#   取值: true | false
#   说明:
#     - true:  每张图打印 [处理] [过滤] [完成] 等详细日志
#     - false: 静默模式，仅打印错误信息
#   推荐: true（调试和监控时）；false（生产批量处理时）
verbose: true


# ------------------------------------------------------------
# 输入与输出路径（I/O）
# ------------------------------------------------------------

# 输入目录
#   说明: 待处理图像所在目录路径（支持中文路径）。
#         目录下所有 .png / .jpg / .jpeg 文件都会被处理。
#   示例: "input/"  或  "C:/古籍扫描件/input/"
input_dir: "./input/东坡乐府.三卷.宋.苏轼撰.清宣统三年吴兴朱祖谋据元延祐本重编刊本.中国国家图书馆藏.黑白版"

# 输出目录
#   说明: 处理后图像的输出目录路径（支持中文路径）。
#         会自动创建不存在的子目录。
#   示例: "output/"  或  "C:/古籍扫描件/output/"
output_dir: "./output_final/东坡乐府.三卷.宋.苏轼撰.清宣统三年吴兴朱祖谋据元延祐本重编刊本.中国国家图书馆藏.黑白版"

# 统一缩放目标宽度
#   说明: 统一将图像缩放到此宽度（像素），高度按比例自动计算。
#         设为 0 或留空表示不缩放，保留原始尺寸。
#         Kindle KPW6 推荐 1200 ~ 1448；手机查看 800 ~ 1080 即可。
#   推荐: 1200
target_width: 1200

# 文件匹配模式
#   说明: 只处理输入目录中匹配此模式的文件。
#         支持通配符：*.png（所有PNG）、*.jpg（所有JPG）等。
#   推荐: "*.png"（古籍多为PNG扫描件）
file_pattern: "*.png"


# ------------------------------------------------------------
# 预设配置（可直接引用）
# ------------------------------------------------------------

# 预设1：Kindle KPW6 竖排古籍（推荐）
#   说明: 专为墨水屏阅读器优化，极限压缩，保护文字优先
PRESET_KINDLE_VERTICAL: &PRESET_KINDLE_VERTICAL
  crop_mode: "smart"
  smart_gap_ratio: 0.012
  strict_artifact_filter: false
  edge_tolerance_ratio: 0.06
  padding_ratio_w: 0.025
  padding_ratio_h: 0.025
  padding_min_pixel: 30
  sharpness: 1.3
  otsu_scale: 1.05
  compress_format: "png"
  max_workers: 4

# 预设2：横排现代重印本
#   说明: 针对有页眉页脚的现代重印古籍设计，smart模式自动分离
PRESET_MODERN_REPRINT: &PRESET_MODERN_REPRINT
  crop_mode: "smart"
  smart_gap_ratio: 0.025
  strict_artifact_filter: true
  edge_tolerance_ratio: 0.04
  padding_ratio_w: 0.015
  padding_ratio_h: 0.015
  padding_min_pixel: 20
  sharpness: 1.1
  otsu_scale: 1.0
  compress_format: "png"
  max_workers: 4

# 预设3：多栏古籍/竖排数列（不丢文字模式）
#   说明: 使用union模式，不遗漏任何孤立文字，兼容多栏混排
PRESET_MULTICOLUMN: &PRESET_MULTICOLUMN
  crop_mode: "union"
  strict_artifact_filter: false
  edge_tolerance_ratio: 0.08
  padding_ratio_w: 0.03
  padding_ratio_h: 0.03
  padding_min_pixel: 25
  sharpness: 1.2
  otsu_scale: 1.0
  compress_format: "png"
  max_workers: 4

# 预设4：极致压缩（文件体积优先）
#   说明: 极限压缩，适合存储空间极度有限的场景
PRESET_MAX_COMPRESSION: &PRESET_MAX_COMPRESSION
  crop_mode: "largest"
  strict_artifact_filter: true
  edge_tolerance_ratio: 0.03
  padding_ratio_w: 0.01
  padding_ratio_h: 0.01
  padding_min_pixel: 15
  sharpness: 1.0
  otsu_scale: 1.0
  compress_format: "png"
  max_workers: 6
